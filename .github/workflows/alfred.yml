name: Alfred the automated document validator

on:
  pull_request:
    paths:
      - '**/*.md'

jobs:
  # STAGE 1: Syntax Validation
  check-format:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Markdown Syntax Lint
      uses: nosborn/github-action-markdown-cli@v3.3.0
      with:
        files: .
        config_file: '.github/config/.markdownlint.json'

  # STAGE 2: Phrase & Style Validation
  check-style:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Phrase and Style Lint (Vale)
      uses: errata-ai/vale-action@v2
      with:
        files: '.'
        config: '.github/config/.vale.ini'
        styles: '.github/styles'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
